<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(to top, #ffe4ec, #fff);
    text-align: center;
  }

  h1 {
    margin-top: 20px;
    color: #444;
  }

  .bouquet {
    position: relative;
    width: 320px;
    height: 500px;
    margin: 30px auto;
  }

  .flower {
    position: absolute;
    cursor: pointer;
    transition: transform 0.3s;
  }

  .flower:hover {
    transform: scale(1.15);
  }

  .petal {
    width: 30px;
    height: 30px;
    border-radius: 50%;
    position: absolute;
  }

  .center {
    width: 25px;
    height: 25px;
    background: yellow;
    border-radius: 50%;
    position: absolute;
    top: 18px;
    left: 18px;
    z-index: 2;
  }

  .stem {
    width: 4px;
    height: 90px;
    background: green;
    position: absolute;
    top: 40px;
    left: 30px;
  }

  .wrap {
    position: absolute;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    border-left: 130px solid transparent;
    border-right: 130px solid transparent;
    border-top: 180px solid #ffb6c1;
    z-index: -1;
  }

  #message {
    margin-top: 20px;
    font-size: 20px;
    color: #333;
    min-height: 40px;
    padding: 0 20px;
  }

  iframe {
    display: none;
  }
</style>
</head>
